<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Idiom Forge — Sentence Builder (A/B + Eiken 3→2) rev8i2</title>
<style>
:root{--bg1:#050611;--bg2:#0c1330;--ink:#eaf2ff;--muted:rgba(234,242,255,.72);--glass:rgba(9,12,24,.74);--warn:#ff5a7a;--gold:#ffd86b;--ok:#7cffc5;--btnIdle:.32;--btnTouch:.14;--fade:120ms;}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 14%, rgba(124,255,197,.12), transparent 30%),radial-gradient(circle at 82% 22%, rgba(189,163,255,.10), transparent 28%),radial-gradient(circle at 62% 84%, rgba(255,216,107,.10), transparent 30%),linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg1));padding:max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));overflow-x:hidden;}
.frame{width:100%;max-width:375px;padding:14px;border-radius:28px;background:var(--glass);backdrop-filter:blur(10px) saturate(1.15);border:1px solid rgba(124,255,197,.20);box-shadow:0 22px 70px rgba(0,0,0,.52),0 0 40px rgba(124,255,197,.08);position:relative;}
.topbar{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:10px 12px;border-radius:18px;background:rgba(10,16,34,.30);border:1px solid rgba(124,255,197,.14);}
.topcenter{display:flex;justify-content:center;align-items:center;}
.topright{display:flex;justify-content:flex-end;align-items:center;}
.topspacer{min-height:1px;}
.brand{display:flex;flex-direction:column;gap:2px;min-width:200px}.brand .t{font-weight:900;letter-spacing:.08em;font-size:14px}.brand .s{font-size:11px;color:var(--muted);letter-spacing:.06em}
.controls{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.seg{display:flex;overflow:hidden;border-radius:14px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18)}
.seg button{appearance:none;border:0;padding:10px 12px;background:transparent;color:rgba(255,255,255,.86);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.75}
.seg button.active{background:rgba(124,255,197,.14);opacity:1}
.sel{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:14px;border:1px solid rgba(124,255,197,.14);background:rgba(10,16,34,.18);color:rgba(255,255,255,.86);font-weight:800;letter-spacing:.04em}
.sel.bad{border-color:rgba(255,90,122,.55);background:rgba(255,90,122,.08)}.sel.good{border-color:rgba(124,255,197,.45);background:rgba(124,255,197,.08)}
select{max-width:100%;background:transparent;color:rgba(255,255,255,.92);border:0;outline:none;font-weight:900;letter-spacing:.06em;cursor:pointer;padding:2px 4px}
.card{margin-top:12px;border-radius:18px;background:rgba(10,16,34,.28);border:1px solid rgba(124,255,197,.12);box-shadow:0 10px 26px rgba(0,0,0,.25);padding:12px}
.prompt{display:grid;gap:8px}.prompt .meta{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.chip{font-size:11px;letter-spacing:.06em;padding:6px 10px;border-radius:999px;border:1px solid rgba(189,163,255,.20);background:rgba(189,163,255,.10);color:rgba(234,242,255,.86)display:inline-flex;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip.gold{border-color:rgba(255,216,107,.20);background:rgba(255,216,107,.08)}.chip.warn{border-color:rgba(255,90,122,.22);background:rgba(255,90,122,.08)}
.jp{font-size:15px;font-weight:800;letter-spacing:.02em;line-height:1.35}.scene{font-size:13px;color:rgba(234,242,255,.78);letter-spacing:.02em;line-height:1.35}
.slots{min-height:78px;border-radius:18px;padding:10px;border:1px dashed rgba(255,255,255,.18);background:rgba(10,16,34,.20);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.bank{min-height:92px;border-radius:18px;padding:10px;border:1px solid rgba(124,255,197,.12);background:rgba(10,16,34,.16);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tok{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:16px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.04em;cursor:pointer;user-select:none;opacity:var(--btnIdle);transition:opacity var(--fade) ease,transform var(--fade) ease,background var(--fade) ease,border-color var(--fade) ease}
.tok:active{transform:scale(.97)}.tok.ui-touch{opacity:var(--btnTouch)}.tok.good{border-color:rgba(124,255,197,.38);background:rgba(124,255,197,.10);opacity:.92}.tok.bad{border-color:rgba(255,90,122,.45);background:rgba(255,90,122,.12);opacity:.92}.tok.prep{border-color:rgba(255,216,107,.22)}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:10px}
.btn{flex:1;min-width:120px;padding:12px 14px;border-radius:18px;border:1px solid rgba(124,255,197,.18);background:rgba(10,16,34,.26);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.82}
.btn.primary{border-color:rgba(124,255,197,.30);background:rgba(124,255,197,.14)}.btn.gold{border-color:rgba(255,216,107,.28);background:rgba(255,216,107,.10)}
.status{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,255,255,.10);background:rgba(10,16,34,.18);display:grid;gap:8px}
.status .line{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}.status .msg{font-weight:900;letter-spacing:.04em}.status .sub{color:rgba(234,242,255,.70);font-size:12px;line-height:1.45}
.explain{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,216,107,.18);background:rgba(255,216,107,.06);display:none;gap:10px}
.explain.show{display:grid}.explain h3{margin:0;font-size:13px;letter-spacing:.06em}.explain .p{color:rgba(234,242,255,.86);font-size:12.5px;line-height:1.55}.explain .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:rgba(234,242,255,.82)}
.diag{position:absolute;right:10px;top:10px;max-width:72ch;padding:9px 10px;border-radius:14px;background:rgba(0,0,0,.62);border:1px solid rgba(255,90,122,.45);color:rgba(255,255,255,.92);font:12px ui-monospace,SFMono-Regular,Menlo,monospace;display:none;pointer-events:none;white-space:pre-wrap;z-index:50}


@media (max-width: 420px){
  .frame{padding:12px;border-radius:22px;}
  .topbar{grid-template-columns:1fr auto;gap:8px;}
  .topspacer{display:none;}
  .seg button{padding:9px 10px;}
  .jp{font-size:14px;}
  .scene{font-size:12px;}
  .tok{padding:9px 10px;border-radius:14px;}
  .btn{min-width:96px;padding:11px 12px;border-radius:16px;}
}
</style>
</head><body>
<div class="frame">
  <div class="diag" id="diag"></div>
  <div class="topbar">
  <div class="topspacer" aria-hidden="true"></div>
  <div class="topcenter">
    <div class="seg" role="tablist" aria-label="mode">
        <button id="modeA" class="active" type="button">A (EIKEN)</button>
        <button id="modeB" type="button">B (DAILY)</button>
      </div>
  </div>
  <div class="topright">
    <div class="sel" id="gradeWrap"><span>GRADE</span>
        <select id="gradeSel"><option value="3">3</option><option value="pre2">Pre-2</option><option value="2">2</option></select>
      </div>
  </div>
</div>

  <div class="card">
    <div class="prompt">
      <div class="meta">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <span id="chipMode" class="chip">MODE A</span>
          <span id="chipGrade" class="chip gold">GRADE 3</span>
          <span id="chipFocus" class="chip warn">FOCUS: —</span>
          <span class="chip">5文型</span>
        </div>
        <div><span class="chip">Q <span id="qIndex">1</span>/<span id="qTotal">?</span></span></div>
      </div>
      <div id="jpPrompt" class="jp">（読み込み中…）</div>
      <div id="scenePrompt" class="scene">—</div>
    </div>

    <div style="margin-top:12px;display:grid;gap:10px;">
      <div class="scene">並べ替え（タップで追加 / 既存をタップで戻す）</div>
      <div id="slots" class="slots"></div>

      <div class="scene">BANK</div>
      <div id="bank" class="bank"></div>
 <div class="sel" id="patternWrap"><span>5文型</span>
        <select id="patternSel"><option value="">選択…</option></select>
      </div>

      

      <div class="actions">
        <button id="btnCheck" class="btn primary" type="button">CHECK</button>
        <button id="btnHint" class="btn gold" type="button">HINT</button>
        <button id="btnClear" class="btn" type="button">CLEAR</button>
        <button id="btnNext" class="btn" type="button">NEXT</button>
      </div>

      <div class="status" aria-live="polite">
        <div class="line"><div class="msg" id="statusMsg">英文＋5文型を答えよう。</div><div class="msg">SCORE: <span id="score">0</span></div></div>
        <div class="sub" id="statusSub">正解時は赤表示なし。文型が違う場合は「強ガイド」＋SVOO⇄SVO（to/for）広域救済。</div>
      </div>

      <div id="explain" class="explain">
        <h3 id="expTitle">解説</h3>
        <div class="mono" id="expDiff">—</div>
        <div class="p" id="expBody">—</div>
      </div>
    </div>
  </div>
</div>

function isWord(t){return /^[A-Za-z]+$/.test(t||'');}
function lower(t){return (t||'').toLowerCase();}
function pickVerb(tokens){
  var skip={'i':1,'you':1,'he':1,'she':1,'it':1,'we':1,'they':1,'my':1,'your':1,'his':1,'her':1,'our':1,'their':1,'the':1,'a':1,'an':1,'this':1,'that':1,'these':1,'those':1};

function looksAdj(t){

function looksNounStart(t){
  t=lower(t);
  if(!t) return false;
  if(t==='a'||t==='an'||t==='the') return true;
  if(t==='me'||t==='him'||t==='her'||t==='us'||t==='them'||t==='it'||t==='you') return true;
  return isWord(t);
}
function isPrepTok(t){

function findToForAfter(tokens, start){
  for(var i=start;i<tokens.length;i++){
    var t=lower(tokens[i]);
    if(t==='to'||t==='for') return {prep:t,index:i};

}
function inferPatternFromSentence(raw){
  var tokens=tokenize(raw);
  while(tokens.length && !isWord(tokens[tokens.length-1])) tokens.pop();

  var vIndex=-1;

  if(vIndex<0) vIndex=1;
  var t1=lower(tokens[vIndex+1]||'');
  var t2=lower(tokens[vIndex+2]||'');

  if(link[verb]){
    if(looksAdj(t1) || looksNounStart(t1)) return {guess:'2',verb:verb,why:'Vが状態系（be/become/look/feel等）で、後ろが説明（C）っぽい'};
  }

  // SVOC first
  if(svoc[verb]){
    if(looksNounStart(t1) && (looksAdj(t2) || looksNounStart(t2))) return {guess:'5',verb:verb,why:'Oの後ろに説明（C）が来ている（O=C / OがCの状態）'};

  if(ditrans[verb]){
    var isPerson=(t1==='me'||t1==='him'||t1==='her'||t1==='us'||t1==='them'||t1==='you');
    if(isPerson) return {guess:'4',verb:verb,why:'V直後が受け手（人）なのでSVOO（人→物）'};
    var pp=findToForAfter(tokens, vIndex+1);
    if(pp) return {guess:'3',verb:verb,why:'後ろに '+pp.prep+' がある（物 + '+pp.prep+' + 人）なのでSVO'};
    if(looksNounStart(t1) && looksNounStart(t2) && !isPrepTok(t2)) return {guess:'4',verb:verb,why:'to/for が無く、名詞が続くのでSVOO寄り'};

  if(looksNounStart(t1)) return {guess:'3',verb:verb,why:'Vの直後に名詞/代名詞が来て「何を？」が成立（O）'};
  return {guess:'1',verb:verb,why:'S+Vで一旦成立しそう（残りは修飾語の可能性）'};
}

function patternCoreTips(){

function patternTipsByNumber(n){

  if(n==='3') return 'SVO：Vの直後に目的語O。授与系でも「物 + to/for + 人」はここ。';
  if(n==='4') return 'SVOO：目的語が2つ（人→物）。give/buy/send/show/teach など。';
