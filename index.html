<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Idiom Forge — Sentence Builder (A/B + Eiken 3→2) rev7</title>
<style>
:root{--bg1:#050611;--bg2:#0c1330;--ink:#eaf2ff;--muted:rgba(234,242,255,.72);--glass:rgba(9,12,24,.74);--warn:#ff5a7a;--gold:#ffd86b;--ok:#7cffc5;--btnIdle:.32;--btnTouch:.14;--fade:120ms;}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 14%, rgba(124,255,197,.12), transparent 30%),radial-gradient(circle at 82% 22%, rgba(189,163,255,.10), transparent 28%),radial-gradient(circle at 62% 84%, rgba(255,216,107,.10), transparent 30%),linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg1));padding:12px;}
.frame{width:min(94vw,680px);padding:14px;border-radius:28px;background:var(--glass);backdrop-filter:blur(10px) saturate(1.15);border:1px solid rgba(124,255,197,.20);box-shadow:0 22px 70px rgba(0,0,0,.52),0 0 40px rgba(124,255,197,.08);position:relative;}
.topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:18px;background:rgba(10,16,34,.30);border:1px solid rgba(124,255,197,.14);}
.brand{display:flex;flex-direction:column;gap:2px;min-width:200px}.brand .t{font-weight:900;letter-spacing:.08em;font-size:14px}.brand .s{font-size:11px;color:var(--muted);letter-spacing:.06em}
.controls{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.seg{display:flex;overflow:hidden;border-radius:14px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18)}
.seg button{appearance:none;border:0;padding:10px 12px;background:transparent;color:rgba(255,255,255,.86);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.75}
.seg button.active{background:rgba(124,255,197,.14);opacity:1}
.sel{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:14px;border:1px solid rgba(124,255,197,.14);background:rgba(10,16,34,.18);color:rgba(255,255,255,.86);font-weight:800;letter-spacing:.04em}
.sel.bad{border-color:rgba(255,90,122,.55);background:rgba(255,90,122,.08)}.sel.good{border-color:rgba(124,255,197,.45);background:rgba(124,255,197,.08)}
select{background:transparent;color:rgba(255,255,255,.92);border:0;outline:none;font-weight:900;letter-spacing:.06em;cursor:pointer;padding:2px 4px}
.card{margin-top:12px;border-radius:18px;background:rgba(10,16,34,.28);border:1px solid rgba(124,255,197,.12);box-shadow:0 10px 26px rgba(0,0,0,.25);padding:12px}
.prompt{display:grid;gap:8px}.prompt .meta{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.chip{font-size:11px;letter-spacing:.06em;padding:6px 10px;border-radius:999px;border:1px solid rgba(189,163,255,.20);background:rgba(189,163,255,.10);color:rgba(234,242,255,.86)}
.chip.gold{border-color:rgba(255,216,107,.20);background:rgba(255,216,107,.08)}.chip.warn{border-color:rgba(255,90,122,.22);background:rgba(255,90,122,.08)}
.jp{font-size:15px;font-weight:800;letter-spacing:.02em;line-height:1.35}.scene{font-size:13px;color:rgba(234,242,255,.78);letter-spacing:.02em;line-height:1.35}
.slots{min-height:78px;border-radius:18px;padding:10px;border:1px dashed rgba(255,255,255,.18);background:rgba(10,16,34,.20);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.bank{min-height:92px;border-radius:18px;padding:10px;border:1px solid rgba(124,255,197,.12);background:rgba(10,16,34,.16);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tok{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:16px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.04em;cursor:pointer;user-select:none;opacity:var(--btnIdle);transition:opacity var(--fade) ease,transform var(--fade) ease,background var(--fade) ease,border-color var(--fade) ease}
.tok:active{transform:scale(.97)}.tok.ui-touch{opacity:var(--btnTouch)}.tok.good{border-color:rgba(124,255,197,.38);background:rgba(124,255,197,.10);opacity:.92}.tok.bad{border-color:rgba(255,90,122,.45);background:rgba(255,90,122,.12);opacity:.92}.tok.prep{border-color:rgba(255,216,107,.22)}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:10px}
.btn{flex:1;min-width:120px;padding:12px 14px;border-radius:18px;border:1px solid rgba(124,255,197,.18);background:rgba(10,16,34,.26);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.82}
.btn.primary{border-color:rgba(124,255,197,.30);background:rgba(124,255,197,.14)}.btn.gold{border-color:rgba(255,216,107,.28);background:rgba(255,216,107,.10)}
.status{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,255,255,.10);background:rgba(10,16,34,.18);display:grid;gap:8px}
.status .line{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}.status .msg{font-weight:900;letter-spacing:.04em}.status .sub{color:rgba(234,242,255,.70);font-size:12px;line-height:1.45}
.explain{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,216,107,.18);background:rgba(255,216,107,.06);display:none;gap:10px}
.explain.show{display:grid}.explain h3{margin:0;font-size:13px;letter-spacing:.06em}.explain .p{color:rgba(234,242,255,.86);font-size:12.5px;line-height:1.55}.explain .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:rgba(234,242,255,.82)}
.diag{position:absolute;right:10px;top:10px;max-width:72ch;padding:9px 10px;border-radius:14px;background:rgba(0,0,0,.62);border:1px solid rgba(255,90,122,.45);color:rgba(255,255,255,.92);font:12px ui-monospace,SFMono-Regular,Menlo,monospace;display:none;pointer-events:none;white-space:pre-wrap;z-index:50}
</style>
</head><body>
<div class="frame">
  <div class="diag" id="diag"></div>
  <div class="topbar">
    <div class="brand"><div class="t">IDIOM FORGE</div><div class="s">rev7: 各級30問 + 5文型のみ回答</div></div>
    <div class="controls">
      <div class="seg" role="tablist" aria-label="mode">
        <button id="modeA" class="active" type="button">A (EIKEN)</button>
        <button id="modeB" type="button">B (DAILY)</button>
      </div>
      <div class="sel" id="gradeWrap"><span>GRADE</span>
        <select id="gradeSel"><option value="3">3</option><option value="pre2">Pre-2</option><option value="2">2</option></select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="prompt">
      <div class="meta">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <span id="chipMode" class="chip">MODE A</span>
          <span id="chipGrade" class="chip gold">GRADE 3</span>
          <span id="chipFocus" class="chip warn">FOCUS: —</span>
          <span class="chip">5文型</span>
        </div>
        <div><span class="chip">Q <span id="qIndex">1</span>/<span id="qTotal">?</span></span></div>
      </div>
      <div id="jpPrompt" class="jp">（読み込み中…）</div>
      <div id="scenePrompt" class="scene">—</div>
    </div>

    <div style="margin-top:12px;display:grid;gap:10px;">
      <div class="sel" id="patternWrap"><span>5文型</span>
        <select id="patternSel"><option value="">選択…</option></select>
      </div>

      <div class="scene">BUILD（タップで追加 / 既存をタップで戻す）</div>
      <div id="slots" class="slots"></div>

      <div class="scene">BANK</div>
      <div id="bank" class="bank"></div>

      <div class="actions">
        <button id="btnCheck" class="btn primary" type="button">CHECK</button>
        <button id="btnHint" class="btn gold" type="button">HINT</button>
        <button id="btnClear" class="btn" type="button">CLEAR</button>
        <button id="btnNext" class="btn" type="button">NEXT</button>
      </div>

      <div class="status" aria-live="polite">
        <div class="line"><div class="msg" id="statusMsg">英文＋5文型を答えよう。</div><div class="msg">SCORE: <span id="score">0</span></div></div>
        <div class="sub" id="statusSub">正解時は赤表示なし。文型が違う場合はガイドします。</div>
      </div>

      <div id="explain" class="explain">
        <h3 id="expTitle">解説</h3>
        <div class="mono" id="expDiff">—</div>
        <div class="p" id="expBody">—</div>
      </div>
    </div>
  </div>
</div>

function isPrep(tok){tok=(tok||'').toLowerCase();return PREP_EXPLAIN.hasOwnProperty(tok);} 
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}} 
function expandContractions(s){var map=[[/\bi'm\b/g,'i am'],[/\byou're\b/g,'you are'],[/\bwe're\b/g,'we are'],[/\bthey're\b/g,'they are'],[/\bhe's\b/g,'he is'],[/\bshe's\b/g,'she is'],[/\bit's\b/g,'it is'],[/\bthat's\b/g,'that is'],[/\bthere's\b/g,'there is'],[/\bcan't\b/g,'cannot'],[/\bwon't\b/g,'will not'],[/\bdon't\b/g,'do not'],[/\bdoesn't\b/g,'does not'],[/\bdidn't\b/g,'did not'],[/\bisn't\b/g,'is not'],[/\baren't\b/g,'are not'],[/\bwasn't\b/g,'was not'],[/\bweren't\b/g,'were not'],[/\bhaven't\b/g,'have not'],[/\bhasn't\b/g,'has not'],[/\bhadn't\b/g,'had not'],[/\bi've\b/g,'i have'],[/\byou've\b/g,'you have'],[/\bwe've\b/g,'we have'],[/\bthey've\b/g,'they have'],[/\bi'll\b/g,'i will'],[/\byou'll\b/g,'you will'],[/\bwe'll\b/g,'we will'],[/\bthey'll\b/g,'they will'],[/\bi'd\b/g,'i would'],[/\byou'd\b/g,'you would'],[/\bhe'd\b/g,'he would'],[/\bshe'd\b/g,'she would'],[/\bthey'd\b/g,'they would'],[/\bwe'd\b/g,'we would']];for(var i=0;i<map.length;i++){s=s.replace(map[i][0],map[i][1]);}return s;} 
function normalizeSentence(s){var lowered=(s||'').replace(/^\s+|\s+$/g,'').replace(/\s+/g,' ').replace(/\s+([\.,!?;:])/g,'$1').toLowerCase();return expandContractions(lowered);} 
function tokenize(s){var out=[];var re=/([A-Za-z]+(?:'[A-Za-z]+)?)|([0-9]+)|([\.,!?;:])|(,)/g;var m;while((m=re.exec(s))!==null){out.push(m[0]);}return out;} 
function lev(a,b){var n=a.length,m=b.length,dp=[];for(var i=0;i<=n;i++){dp[i]=[];for(var j=0;j<=m;j++)dp[i][j]=0;}for(i=0;i<=n;i++)dp[i][0]=i;for(j=0;j<=m;j++)dp[0][j]=j;for(i=1;i<=n;i++){for(j=1;j<=m;j++){var cost=(a[i-1].toLowerCase()===b[j-1].toLowerCase())?0:1;dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+cost);}}return dp[n][m];} 
function bestTargetMatch(userTokens, targets){var best=null,bestD=1e9;for(var i=0;i<targets.length;i++){var tt=tokenize(targets[i]);var d=lev(userTokens,tt);if(d<bestD){bestD=d;best={target:targets[i],targetTokens:tt};}}return best;} 
function prepositionDiff(userTokens,targetTokens){var max=Math.max(userTokens.length,targetTokens.length);for(var i=0;i<max;i++){var u=userTokens[i]||'';var t=targetTokens[i]||'';if(u.toLowerCase()!==t.toLowerCase()){if(isPrep(u)||isPrep(t))return{u:u,t:t};}}return null;} 
function buildPrepositionExplanation(expected, chosen){expected=(expected||'').toLowerCase();chosen=(chosen||'').toLowerCase();var exp=PREP_EXPLAIN[expected];if(!exp)return'';var html='';html+='<b>結論</b>：ここは <b>'+expected+'</b> が自然です。<br>';html+='<b>コアイメージ</b>：'+exp.core+'<br>';html+='<b>判断のコツ</b>：'+exp.rule+'<br>';html+='<b>例</b>：'+exp.when.join(' / ')+'<br>';html+='<b>注意</b>：'+exp.contrast.join(' / ');if(chosen&&chosen!==expected&&PREP_EXPLAIN[chosen]){html+='<hr style="border:0;border-top:1px solid rgba(255,255,255,.12);margin:8px 0">';html+='あなたの <b>'+chosen+'</b>：'+PREP_EXPLAIN[chosen].core;}return html;}

var els={modeA:$('modeA'),modeB:$('modeB'),gradeSel:$('gradeSel'),patternSel:$('patternSel'),patternWrap:$('patternWrap'),chipMode:$('chipMode'),chipGrade:$('chipGrade'),chipFocus:$('chipFocus'),qIndex:$('qIndex'),qTotal:$('qTotal'),jpPrompt:$('jpPrompt'),scenePrompt:$('scenePrompt'),slots:$('slots'),bank:$('bank'),btnCheck:$('btnCheck'),btnHint:$('btnHint'),btnClear:$('btnClear'),btnNext:$('btnNext'),statusMsg:$('statusMsg'),statusSub:$('statusSub'),scoreEl:$('score'),explain:$('explain'),expTitle:$('expTitle'),expDiff:$('expDiff'),expBody:$('expBody')};

function rebuildPool(){pool=[];for(var i=0;i<ITEMS.length;i++){if(ITEMS[i].grade===grade)pool.push(ITEMS[i]);}idx=0;hintLevel=0;els.qTotal.textContent=String(pool.length||1);loadItem();}
function renderTokens(){els.slots.innerHTML='';els.bank.innerHTML='';function mk(t,where){var b=document.createElement('button');b.type='button';b.className='tok'+(isPrep(t)?' prep':'');b.textContent=t;b.addEventListener('pointerdown',function(e){e.preventDefault();b.classList.add('ui-touch');},{passive:false});b.addEventListener('pointerup',function(e){e.preventDefault();b.classList.remove('ui-touch');},{passive:false});b.addEventListener('pointercancel',function(){b.classList.remove('ui-touch');});b.addEventListener('click',function(){if(where==='bank')moveBankToSlot(t);else moveSlotToBank(t);});return b;}if(slotTokens.length===0){var h=document.createElement('div');h.className='scene';h.textContent='（ここに英文を組み立て）';h.style.opacity='0.7';els.slots.appendChild(h);}else{for(var i=0;i<slotTokens.length;i++)els.slots.appendChild(mk(slotTokens[i],'slot'));}for(var j=0;j<bankTokens.length;j++)els.bank.appendChild(mk(bankTokens[j],'bank'));}

function markAllGood(){var btns=els.slots.querySelectorAll('button.tok');for(var i=0;i<btns.length;i++){btns[i].classList.remove('bad');btns[i].classList.add('good');}}

function showAltGuideIfNeeded(it,userRaw){if(!it||!it.aGuide)return;var userNorm=normalizeSentence(userRaw);var prefNorm=normalizeSentence(it.aGuide.preferred);if(userNorm===prefNorm)return;els.expTitle.textContent=it.aGuide.title||'ガイド';els.expDiff.textContent='あなた：'+userRaw+' / 推奨：'+it.aGuide.preferred;els.expBody.innerHTML='<b>どちらも正解</b>です。<br>ただしこの文脈では <b>have to</b> のほうが自然になりやすいです。<br><br>'+'<b>理由</b>：'+it.aGuide.why+'<br><b>注意</b>：'+it.aGuide.tip;els.explain.classList.add('show');}
function checkAnswer(){els.explain.classList.remove('show');var it=pool[idx];if(!it)return;var userPattern=els.patternSel.value;var userRaw=currentSentence();var user=normalizeSentence(userRaw);if(!user||user.replace(/\s/g,'').length===0){setStatus(false,'英文がまだです。','BANKから並べて英文を完成させてください。');return;}var targets=it.targets;var normalizedTargets=[];for(var i=0;i<targets.length;i++)normalizedTargets.push(normalizeSentence(targets[i]));var acceptList;if(mode==='B')acceptList=normalizedTargets;else acceptList=(it&&it.allowAltInA)?normalizedTargets:[normalizedTargets[0]];var sentenceOk=(acceptList.indexOf(user)!==-1);if(userPattern===''){if(sentenceOk){markAllGood();setStatus(false,'英文はOK。5文型を選択しよう。','5文型を選んでから CHECK。');}else{setStatus(false,'英文を直そう。','まず英文を完成。その後 5文型 を選択。');}els.patternWrap.classList.add('bad');return;}var patternOk=(userPattern===it.pattern);if(sentenceOk&&patternOk){setStatus(true,'✅ 正解！','英文・5文型が一致。');markAllGood();els.patternWrap.classList.add('good');if(mode==='A'&&it&&it.allowAltInA)showAltGuideIfNeeded(it,userRaw);return;}if(sentenceOk&&!patternOk){markAllGood();els.patternWrap.classList.add('bad');setStatus(false,'英文はOK。5文型が違う。','正しい文型を確認して次へ。');els.expTitle.textContent='ガイド：5文型';els.expDiff.textContent='あなた：'+patternLabel(userPattern)+' ｜ 正解：'+patternLabel(it.pattern);els.expBody.innerHTML='コツ：動詞の後ろに O（目的語）や C（補語）が必要かを確認。';els.explain.classList.add('show');return;}var userTokens=tokenize(userRaw);var best=bestTargetMatch(userTokens,(mode==='B')?targets:[targets[0]]);if(best)highlightByComparison(userTokens,best.targetTokens);setStatus(false,'❌ 不正解。英文を直そう。','前置詞・語順を確認。');if(best){var diff=prepositionDiff(userTokens,best.targetTokens);if(diff&&diff.t){var expected=isPrep(diff.t)?diff.t:diff.u;var chosen=isPrep(diff.u)?diff.u:'';els.expTitle.textContent='前置詞解説：'+expected;els.expDiff.textContent='あなた：'+userRaw+' / 参考解：'+best.target;els.expBody.innerHTML=buildPrepositionExplanation(expected,chosen);els.explain.classList.add('show');return;}}els.expTit
