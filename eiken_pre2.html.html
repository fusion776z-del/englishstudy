<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Idiom Forge — Sentence Builder (Eiken Pre-2 / PRE-2)</title>
<style>
:root{--bg1:#050611;--bg2:#0c1330;--ink:#eaf2ff;--muted:rgba(234,242,255,.72);--glass:rgba(9,12,24,.74);--warn:#ff5a7a;--gold:#ffd86b;--ok:#7cffc5;--btnIdle:.32;--btnTouch:.14;--fade:120ms;}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 14%, rgba(124,255,197,.12), transparent 30%),radial-gradient(circle at 82% 22%, rgba(189,163,255,.10), transparent 28%),radial-gradient(circle at 62% 84%, rgba(255,216,107,.10), transparent 30%),linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg1));padding:max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));overflow-x:hidden;}
.frame{width:100%;max-width:375px;padding:14px;border-radius:28px;background:var(--glass);backdrop-filter:blur(10px) saturate(1.15);border:1px solid rgba(124,255,197,.20);box-shadow:0 22px 70px rgba(0,0,0,.52),0 0 40px rgba(124,255,197,.08);position:relative;}
.topbar{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 12px;border-radius:18px;background:rgba(10,16,34,.30);border:1px solid rgba(124,255,197,.14);}
.topcenter{display:flex;justify-content:center;align-items:center;}
.topright{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;}
.topspacer{min-height:1px;}
.brand{display:flex;flex-direction:column;gap:2px;min-width:200px}.brand .t{font-weight:900;letter-spacing:.08em;font-size:14px}.brand .s{font-size:11px;color:var(--muted);letter-spacing:.06em}
.controls{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.seg{display:flex;overflow:hidden;border-radius:14px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18)}
.seg button{appearance:none;border:0;padding:10px 12px;background:transparent;color:rgba(255,255,255,.86);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.75}
.seg button.active{background:rgba(124,255,197,.14);opacity:1}
.sel{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:14px;border:1px solid rgba(124,255,197,.14);background:rgba(10,16,34,.18);color:rgba(255,255,255,.86);font-weight:800;letter-spacing:.04em}
.sel.bad{border-color:rgba(255,90,122,.55);background:rgba(255,90,122,.08)}.sel.good{border-color:rgba(124,255,197,.45);background:rgba(124,255,197,.08)}
select{max-width:100%;
  background:#d9d9d9; /* 灰色で見やすく */
  color:#111;
  border:1px solid #bdbdbd;
  border-radius:10px;
  outline:none;
  font-weight:900;
  letter-spacing:.06em;
  cursor:pointer;
  padding:6px 10px;
  appearance:none;
}
select:focus{box-shadow:0 0 0 2px rgba(255,216,107,.35);}
select option{background:#f3f3f3;color:#111;}
.card{margin-top:12px;border-radius:18px;background:rgba(10,16,34,.28);border:1px solid rgba(124,255,197,.12);box-shadow:0 10px 26px rgba(0,0,0,.25);padding:12px}
.prompt{display:grid;gap:8px}.prompt .meta{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.chip{font-size:11px;letter-spacing:.06em;padding:6px 10px;border-radius:999px;border:1px solid rgba(189,163,255,.20);background:rgba(189,163,255,.10);color:rgba(234,242,255,.86);display:inline-flex;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip.gold{border-color:rgba(255,216,107,.20);background:rgba(255,216,107,.08)}.chip.warn{border-color:rgba(255,90,122,.22);background:rgba(255,90,122,.08)}
.jp{font-size:15px;font-weight:800;letter-spacing:.02em;line-height:1.35}.scene{font-size:13px;color:rgba(234,242,255,.78);letter-spacing:.02em;line-height:1.35}
.slots{min-height:78px;border-radius:18px;padding:10px;border:1px dashed rgba(255,255,255,.18);background:rgba(10,16,34,.20);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.bank{min-height:92px;border-radius:18px;padding:10px;border:1px solid rgba(124,255,197,.12);background:rgba(10,16,34,.16);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tok{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:16px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.04em;cursor:pointer;user-select:none;opacity:var(--btnIdle);transition:opacity var(--fade) ease,transform var(--fade) ease,background var(--fade) ease,border-color var(--fade) ease}
.tok:active{transform:scale(.97)}.tok.ui-touch{opacity:var(--btnTouch)}.tok.good{border-color:rgba(124,255,197,.38);background:rgba(124,255,197,.10);opacity:.92}.tok.bad{border-color:rgba(255,90,122,.45);background:rgba(255,90,122,.12);opacity:.92}.tok.prep{border-color:rgba(255,216,107,.22)}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:10px}
.btn{flex:1;min-width:120px;padding:12px 14px;border-radius:18px;border:1px solid rgba(124,255,197,.18);background:rgba(10,16,34,.26);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.82}
.btn.primary{border-color:rgba(124,255,197,.30);background:rgba(124,255,197,.14)}.btn.gold{border-color:rgba(255,216,107,.28);background:rgba(255,216,107,.10)}
.status{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,255,255,.10);background:rgba(10,16,34,.18);display:grid;gap:8px}
.status .line{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}.status .msg{font-weight:900;letter-spacing:.04em}.status .sub{color:rgba(234,242,255,.70);font-size:12px;line-height:1.45}
.explain{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,216,107,.18);background:rgba(255,216,107,.06);display:none;gap:10px}
.explain.show{display:grid}.explain h3{margin:0;font-size:13px;letter-spacing:.06em}.explain .p{color:rgba(234,242,255,.86);font-size:12.5px;line-height:1.55}.explain .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:rgba(234,242,255,.82)}
.diag{position:absolute;right:10px;top:10px;max-width:72ch;padding:9px 10px;border-radius:14px;background:rgba(0,0,0,.62);border:1px solid rgba(255,90,122,.45);color:rgba(255,255,255,.92);font:12px ui-monospace,SFMono-Regular,Menlo,monospace;display:none;pointer-events:none;white-space:pre-wrap;z-index:50}


@media (max-width: 420px){
  .frame{padding:12px;border-radius:22px;}
  .topbar{grid-template-columns:1fr auto;gap:8px;}
  .topspacer{display:none;}
  .seg button{padding:9px 10px;}
  .jp{font-size:14px;}
  .scene{font-size:12px;}
  .tok{padding:9px 10px;border-radius:14px;}
  .btn{min-width:96px;padding:11px 12px;border-radius:16px;}
}

/* === Exam Clean UI Overrides === */
/* BANK & slots text to white */
.bank, .bank *{color:#ffffff;}
.slots, .slots *{color:#ffffff;}
.bank .tok, .slots .tok{opacity:1;}

/* Hide decorative chips (MODE / GRADE / SHELF / FOCUS) */
#chipMode, #chipGrade, #chipSkill, #chipFocus{display:none !important;}

/* Hide instructional helper text */
.scene{display:none;}


/* Fixed-grade build */
#gradeWrap{display:none !important;}
</style>
</head><body>
<div class="frame">
  <div class="diag" id="diag"></div>
  <div class="topbar">
  <div class="topspacer" aria-hidden="true"></div>
<div class="topright">
  <div class="sel good" id="gradeBadge"><span>PRE-2</span></div>
    <div class="sel" id="gradeWrap"><span>GRADE</span>
        <select id="gradeSel" disabled><option value="pre2" selected>Pre-2</option></select>
      </div>

  <div class="sel" id="skillWrap"><span>SHELF</span>
    <select id="skillSel">
      <option value="all">ALL</option>
      <option value="tense">時制（現在/過去/未来）</option>
      <option value="modal">助動詞（can/will/must/should）</option>
      <option value="prep">前置詞（時間・場所・期間）</option>
      <option value="conj">接続詞（because/when/if）</option>
      <option value="comp">比較（比較級・最上級）</option>
      <option value="qneg">疑問文/否定文</option>
      <option value="pron">代名詞・数量（some/any など）</option>
      <option value="verbprep">動詞＋前置詞（look for 等）</option>
    </select>
  </div>

</div>
</div>

  <div class="card">
    <div class="prompt">
      <div class="meta">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <span id="chipMode" class="chip">MODE A</span>
          <span id="chipGrade" class="chip gold">GRADE Pre-2</span>
            <span id=\"chipSkill\" class=\"chip\">SHELF ALL</span>
            <span id="chipFocus" class="chip warn">FOCUS: —</span>
          <span class="chip">5文型</span>
        </div>
        <div><span class="chip">Q <span id="qIndex">1</span>/<span id="qTotal">?</span></span></div>
      </div>
      <div id="jpPrompt" class="jp">（読み込み中…）</div>
      <div id="scenePrompt" class="scene">—</div>
    </div>

    <div style="margin-top:12px;display:grid;gap:10px;">
      <div class="scene">並べ替え（タップで追加 / 既存をタップで戻す）</div>
      <div id="slots" class="slots"></div>

      <div class="scene">BANK</div>
      <div id="bank" class="bank"></div>
 <div class="sel" id="patternWrap"><span>5文型</span>
        <select id="patternSel"><option value="">選択…</option></select>
      </div>

      

      <div class="actions">
        <button id="btnCheck" class="btn primary" type="button">CHECK</button>
        <button id="btnHint" class="btn gold" type="button">HINT</button>
        <button id="btnClear" class="btn" type="button">CLEAR</button>
        <button id="btnNext" class="btn" type="button">NEXT</button>
      </div>

      <div class="status" aria-live="polite">
        <div class="line"><div class="msg" id="statusMsg">英文＋5文型を答えよう。</div><div class="msg">SCORE: <span id="score">0</span></div></div>
        <div class="sub" id="statusSub">正解時は赤表示なし。文型が違う場合は「強ガイド」＋SVOO⇄SVO（to/for）広域救済。</div>
      </div>

      <div id="explain" class="explain">
        <h3 id="expTitle">解説</h3>
        <div class="mono" id="expDiff">—</div>
        <div class="p" id="expBody">—</div>
      </div>
    </div>
  </div>
</div>

function renderTokens(){els.slots.innerHTML='';els.bank.innerHTML='';function mk(t,where){var b=document.createElement('button');b.type='button';b.className='tok'+(isPrep(t)?' prep':'');b.textContent=t;b.addEventListener('pointerdown',function(e){e.preventDefault();b.classList.add('ui-touch');},{passive:false});b.addEventListener('pointerup',function(e){e.preventDefault();b.classList.remove('ui-touch');},{passive:false});b.addEventListener('pointercancel',function(){b.classList.remove('ui-touch');});b.addEventListener('click',function(){if(where==='bank')moveBankToSlot(t);else moveSlotToBank(t);});return b;}if(slotTokens.length===0){var h=document.createElement('div');h.className='scene';h.textContent='（ここに英文を組み立て）';h.style.opacity='0.7';els.slots.appendChild(h);}else{for(var i=0;i<slotTokens.length;i++)els.slots.appendChild(mk(slotTokens[i],'slot'));}for(var j=0;j<bankTokens.length;j++)els.bank.appendChild(mk(bankTokens[j],'bank'));}
function moveBankToSlot(t){var i=bankTokens.indexOf(t);if(i<0)return;bankTokens.splice(i,1);slotTokens.push(t);els.explain.classList.remove('show');els.statusMsg.textContent='組み立て中…';renderTokens();}
function moveSlotToBank(t){var i=slotTokens.indexOf(t);if(i<0)return;slotTokens.splice(i,1);bankTokens.push(t);els.explain.classList.remove('show');els.statusMsg.textContent='調整中…';renderTokens();}
function currentSentence(){return slotTokens.join(' ').replace(/\s+([\.,!?;:])/g,'$1');}
function setStatus(ok,msg,sub){els.statusMsg.textContent=msg;if(sub!=null)els.statusSub.textContent=sub;if(ok){score+=10;els.scoreEl.textContent=String(score);}}
function markAllGood(){var btns=els.slots.querySelectorAll('button.tok');for(var i=0;i<btns.length;i++){btns[i].classList.remove('bad');btns[i].classList.add('good');}}
function highlightByComparison(userTokens,targetTokens){var btns=els.slots.querySelectorAll('button.tok');for(var i=0;i<btns.length;i++){btns[i].classList.remove('good');btns[i].classList.remove('bad');var u=(userTokens[i]||'').toLowerCase();var t=(targetTokens[i]||'').toLowerCase();if(u&&t&&u===t)btns[i].classList.add('good');else btns[i].classList.add('bad');}}
function resetPatternUI(){els.patternSel.value='';els.patternWrap.classList.remove('bad');els.patternWrap.classList.remove('good');}
function loadItem(){els.explain.classList.remove('show');resetPatternUI();var it=pool[idx]||null;
  updateSkillChip(it);els.qIndex.textContent=String(Math.min(idx+1,Math.max(1,pool.length)));if(!it){els.jpPrompt.textContent='このGRADEには問題がありません。';els.scenePrompt.textContent='GRADEを変えてください。'; updateSkillChip(null);slotTokens=[];bankTokens=['I','am','ready','.'];renderTokens();return;}els.chipGrade.textContent='GRADE '+(grade==='pre2'?'Pre-2':grade);var focus=(it.focus&&it.focus.length)?it.focus.join(', ').toUpperCase():'—';els.chipFocus.textContent='FOCUS: '+focus;els.chipMode.textContent='MODE A';els.jpPrompt.textContent=it.promptJP;els.scenePrompt.textContent='【英検】'+it.promptJP+'（英文＋文型）';slotTokens=[];bankTokens=it.bank.slice();shuffle(bankTokens);hintLevel=0;els.statusMsg.textContent='英文＋5文型を答えよう。';els.statusSub.textContent='A:基本1解（安全言い換えのみ許可）';renderTokens();}
function nextItem(){if(pool.length===0)return;idx=(idx+1)%pool.length;loadItem();}
function showHint(){
  var it=pool[idx];if(!it)return;
  hintLevel=Math.min(3,hintLevel+1);
  var raw=currentSentence();
  var inf=(raw&&raw.replace(/\s/g,'').length)? inferPatternFromSentence(raw) : null;
  if(hintLevel===1){
    var msg='HINT 1（文型）: '+patternCoreTips();
    if(inf){ msg+='\n推定：'+patternLabel(inf.guess)+'（V='+inf.verb+'）'; }
    els.statusMsg.textContent=msg;
    els.explain.classList.remove('show');
  } else if(hintLevel===2){
    var msg2='HINT 2（SV↔SVO）: Vの直後をチェック。前置詞→SV寄り / 名詞・代名詞→SVO寄り。';
    if(inf){ msg2+='\n今の推定：'+patternLabel(inf.guess)+'（'+inf.why+'）'; }
    els.statusMsg.textContent=msg2;
  } else {
    els.statusMsg.textContent='HINT 3（答え）: この問題の文型は「'+patternLabel(it.pattern)+'」。理由は下のガイド。';
    els.expTitle.textContent='強ヒント：5文型ガイド';
    els.expDiff.textContent='（英文は作ったまま）';
    els.expBody.innerHTML=patternCoreTips()+'<hr style="border:0;border-top:1px solid rgba(255,255,255,.12);margin:10px 0">'+patternTipsByNumber(it.pattern);
    if(inf){
      els.expBody.innerHTML+='<hr style="border:0;border-top:1px solid rgba(255,255,255,.12);margin:10px 0"><b>あなたの文の推定</b>：'+patternLabel(inf.guess)+'（V='+inf.verb+'）<br><span style="color:rgba(234,242,255,.78)">'+inf.why+'</span>';
    }
    els.explain.classList.add('show');
  }
}
function clearAll(){bankTokens=bankTokens.concat(slotTokens);slotTokens=[];renderTokens();els.explain.classList.remove('show');els.statusMsg.textContent='クリアしました。';}
function showAltGuideIfNeeded(it,userRaw){
  if(!it||!it.aGuide)return;
  var userNorm=normalizeSentence(userRaw);
  var prefNorm=normalizeSentence(it.aGuide.preferred||'');
  if(userNorm===prefNorm && !(it&&it.aGuide&&it.aGuide.always))return;
  els.expTitle.textContent=(it.aGuide.title||'ガイド');
  els.expDiff.textContent='あなた：'+userRaw+' / 推奨：'+(it.aGuide.preferred||'');
  var body='';
  if(it.aGuide.kind==='article'){body+='<b>冠詞 a / the の違い</b>（文脈の有無）を確認しよう。';}else{body+='<b>どちらも正解</b>です。';}
  if(it.aGuide.why) body+='<br><br><b>理由</b>：'+it.aGuide.why;
  if(it.aGuide.tip) body+='<br><b>注意</b>：'+it.aGuide.tip;
  if(it.aGuide.alt){
    body+='<hr style="border:0;border-top:1px solid rgba(255,255,255,.12);margin:10px 0">';
    body+='<b>別解</b>：'+it.aGuide.alt;
  }
  els.expBody.innerHTML=body;
  els.explain.classList.add('show');
}
function checkAnswer(){els.explain.classList.remove('show');var it=pool[idx];if(!it)return;var userPattern=els.patternSel.value;var userRaw=currentSentence();var user=normalizeSentence(userRaw);if(!user||user.replace(/\s/g,'').length===0){setStatus(false,'英文がまだです。','BANKから並べて英文を完成させてください。');return;}var targets=it.targets;var normalizedTargets=[];for(var i=0;i<targets.length;i++)normalizedTargets.push(normalizeSentence(targets[i]));var acceptList=(it&&it.allowAltInA)?normalizedTargets:[normalizedTargets[0]];var sentenceOk=(acceptList.indexOf(user)!==-1);if(userPattern===''){if(sentenceOk){markAllGood();setStatus(false,'英文はOK。5文型を選択しよう。','5文型を選んでから CHECK。');}else{setStatus(false,'英文を直そう。','まず英文を完成。その後 5文型 を選択。');}els.patternWrap.classList.add('bad');return;}var correctPattern=it.pattern;
  var infP=inferPatternFromSentence(userRaw);
  // 授与系のSVOO(4) ⇄ SVO+to/for(3) を広く救済
  var altV={give:1,gave:1,send:1,sent:1,show:1,showed:1,teach:1,taught:1,tell:1,told:1,lend:1,lent:1,buy:1,bought:1,make:1,made:1,cook:1,cooked:1,get:1,got:1,find:1,found:1,offer:1,offered:1,bring:1,brought:1,write:1,wrote:1};
  if(sentenceOk && infP && altV[infP.verb]){
    if(it.pattern==='4' && infP.guess==='3') correctPattern='3';
    if(it.pattern==='3' && infP.guess==='4') correctPattern='4';
  }
  var patternOk=(userPattern===correctPattern);if(sentenceOk&&patternOk){setStatus(true,'✅ 正解！','英文・5文型が一致。');markAllGood();els.patternWrap.classList.add('good');if(it&&it.allowAltInA)showAltGuideIfNeeded(it,userRaw);return;}if(sentenceOk&&!patternOk){markAllGood();els.patternWrap.classList.add('bad');setStatus(false,'英文はOK。5文型が違う。','正しい文型を確認して次へ。');els.expTitle.textContent='ガイド：5文型';els.expDiff.textContent='あなた：'+patternLabel(userPattern)+' ｜ 正解：'+patternLabel(correctPattern);els.expBody.innerHTML=buildStrongPatternGuide(userPattern,correctPattern,userRaw);els.explain.classList.add('show');return;}var userTokens=tokenize(userRaw);var best=bestTargetMatch(userTokens,(false)?targets:[targets[0]]);if(best)highlightByComparison(userTokens,best.targetTokens);setStatus(false,'❌ 不正解。英文を直そう。','前置詞・語順を確認。');if(best){var diff=prepositionDiff(userTokens,best.targetTokens);if(diff&&(diff.t||diff.kind==='drop')){var expected=(diff.kind==='drop')?'':diff.t;var chosen=isPrep(diff.u)?diff.u:'';els.expTitle.textContent='前置詞解説：'+(expected||'(前置詞なし)');els.expDiff.textContent='あなた：'+userRaw+' / 参考解：'+best.target;els.expBody.innerHTML=buildPrepositionExplanation(expected,chosen);els.explain.classList.add('show');return;}}els.expTitle.textContent='ヒント（正解例）';els.expDiff.textContent='例：'+targets[0];if(it&&it.aGuide){  var why=(it.aGuide.why||''); var tip=(it.aGuide.tip||'');  els.expBody.innerHTML= why + (tip?('<br><br><b>Tip</b>: '+tip):'');}else{  els.expBody.innerHTML='語順と前置詞を確認してください。';}els.explain.classList.add('show');}
els.gradeSel.addEventListener('change',function(e){grade=e.target.value;rebuildPool();});
els.skillSel.addEventListener('change',function(e){skill=e.target.value;rebuildPool();});
els.btnCheck.addEventListener('click',checkAnswer);els.btnHint.addEventListener('click',showHint);els.btnClear.addEventListener('click',clearAll);els.btnNext.addEventListener('click',nextItem);
fillPatternOptions();rebuildPool();

// FIXED_GRADE override
try{
  if(typeof grade!=='undefined') grade=FIXED_GRADE;
  if(typeof els!=='undefined' && els.gradeSel) els.gradeSel.value=FIXED_GRADE;
  if(typeof rebuildPool==='function') rebuildPool();
}catch(e){}
</script>
